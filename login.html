<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./login.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <div class="logo">
          <img
            src="./e2c1f0946336333b1ce76d59b2ce680c8536e14b.png"
            alt="Logo"
          />
          <span>Agora</span>
        </div>

        <div class="welcome">
          <h1>Welcome Back</h1>
          <p>Login to your account to continue</p>
        </div>

        <form action="./PROJECT/dash.html">
          <div class="input-group">
            <label>Email</label>
            <input type="email" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" required />
          </div>

          <div class="options">
            <label> <input class="check" type="checkbox" /> Remember me </label>

            <a href="./forgetpassword.html">Forgot Password?</a>
          </div>

          <button>Login</button>
        </form>

        <div class="divider">
          <hr />
          <span>Continue with</span>
          <hr />
        </div>

        <div class="socials">
          <img
            src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
          />
          <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" />
        </div>

        <p class="signup">
          Don't have an account?
          <a href="./signup.html">Sign Up</a>
        </p>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right">
        <img src="./Screenshot (116).png" />
      </div>
    </div>
  </body>
</html>
